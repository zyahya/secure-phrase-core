name: Publish to NuGet on Tag

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract Version from Tag
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Project
        run: |
          dotnet build --configuration Release -p:Version=${{ steps.get_version.outputs.VERSION }}

      - name: Pack Nuget Package
        run: |
          dotnet pack --configuration Release -p:Version=${{ steps.get_version.outputs.VERSION }} --output ./nugpkg --no-build

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./nugpkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
